<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XyberHaze | Lab</title>
<!-- Importing smooth fonts and animation libraries -->
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<style>
:root {
--primary: #00f2ff;
--secondary: #bc13fe;
--bg: #030303;
}
body {
background: var(--bg);
color: #fff;
font-family: 'Inter', sans-serif;
margin: 0;
overflow-x: hidden;
}
/* The Moving Background Effect */
#particles-js {
position: fixed;
width: 100%;
height: 100%;
background-color: #030303;
z-index: -1;
}
.hero {
height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
text-align: center;
}
.glass-card {
background: rgba(255, 255, 255, 0.03);
backdrop-filter: blur(15px);
border: 1px solid rgba(255, 255, 255, 0.1);
padding: 50px;
border-radius: 30px;
box-shadow: 0 0 50px rgba(0,0,0,0.5);
max-width: 800px;
}
h1 {
font-size: 5rem;
margin: 0;
background: linear-gradient(to right, var(--primary), var(--secondary));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
font-weight: 900;
}
.btn {
margin-top: 30px;
padding: 15px 40px;
border: 2px solid var(--secondary);
color: #fff;
text-decoration: none;
border-radius: 50px;
font-weight: bold;
transition: 0.5s;
}
.btn:hover {
background: var(--secondary);
box-shadow: 0 0 30px var(--secondary);
}
</style>
</head>
<body>
<div id="particles-js"></div>

<div class="hero">
<div class="glass-card" data-aos="zoom-in" data-aos-duration="1500">
<h1>XYBERHAZE</h1>
<p style="letter-spacing: 5px; color: var(--primary);">SYSTEM STATUS: [SECURE]</p>
<p>Offensive Security | AI Red Teaming | Blockchain Forensics</p>
<a href="https://t.me/Xyber_Haze" class="btn">ENTER THE LAB</a>
</div>
</div>

<script>
AOS.init();
</script>
</body>
</html>
