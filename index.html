<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XyberHaze | Offensive AI & Technical Clarity</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
<style>
:root { --neon-blue: #00ffff; --neon-purple: #bc13fe; --bg-black: #000000; }
* { box-sizing: border-box; scroll-behavior: smooth; }
body { background-color: var(--bg-black); color: #f0f0f0; font-family: 'Share Tech Mono', monospace; margin: 0; padding: 0; overflow-x: hidden; }

/* Persistent Full-Page Matrix */
canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.4; pointer-events: none; }

nav { position: fixed; top: 0; width: 100%; padding: 15px; background: rgba(0,0,0,0.95); z-index: 100; display: flex; justify-content: center; gap: 20px; border-bottom: 1px solid var(--neon-blue); }
nav a { color: var(--neon-blue); text-decoration: none; text-transform: uppercase; font-size: 0.8rem; font-weight: bold; }

.hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
.avatar { width: 150px; height: 150px; border-radius: 50%; border: 3px solid var(--neon-blue); margin-bottom: 20px; box-shadow: 0 0 20px var(--neon-blue); animation: pulse 3s infinite; object-fit: cover; }
@keyframes pulse { 0%, 100% { box-shadow: 0 0 20px var(--neon-blue); } 50% { box-shadow: 0 0 40px var(--neon-purple); } }

h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(2.5rem, 8vw, 4rem); color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue); margin: 0; letter-spacing: 5px; }

.section { padding: 80px 20px; max-width: 900px; margin: 0 auto; text-align: center; }
.card { background: rgba(10, 10, 10, 0.9); border: 1px solid var(--neon-blue); border-radius: 12px; padding: 30px; backdrop-filter: blur(10px); text-align: left; margin-bottom: 30px; width: 100%; }

/* Mobile Visibility Fixes */
@media (max-width: 600px) {
h1 { font-size: 2rem; letter-spacing: 2px; }
.card { padding: 20px; }
.section { padding: 60px 15px; }
nav { gap: 10px; font-size: 0.7rem; }
}

.feed-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 15px 0; }
.feed-item a { color: #ffffff; text-decoration: none; font-weight: bold; font-size: 1rem; display: block; line-height: 1.4; }
.feed-item a:hover { color: var(--neon-blue); }
.feed-item p { color: #888; font-size: 0.7rem; margin-top: 5px; }

.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 40px; }
