<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XyberHaze | Technical Clarity</title>
<style>
:root {
--bg: #050505;
--glass: rgba(255, 255, 255, 0.03);
--border: rgba(255, 255, 255, 0.1);
--cyan: #00f2ff;
--purple: #bc13fe;
}
body {
background-color: var(--bg);
background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
color: #fff;
font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
margin: 0;
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
text-align: center;
}
.container {
background: var(--glass);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border: 1px solid var(--border);
border-radius: 24px;
padding: 60px 40px;
max-width: 700px;
width: 90%;
box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}
.status {
display: inline-block;
padding: 6px 16px;
border-radius: 100px;
border: 1px solid var(--cyan);
color: var(--cyan);
font-size: 11px;
text-transform: uppercase;
letter-spacing: 3px;
margin-bottom: 24px;
font-weight: 700;
}
h1 {
font-size: clamp(2.5rem, 8vw, 4rem);
margin: 0;
background: linear-gradient(to right, var(--cyan), var(--purple));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
font-weight: 900;
letter-spacing: -2px;
}
p {
color: #a0a0a0;
line-height: 1.8;
font-size: 1.1rem;
margin: 24px 0;
}
.btn {
display: inline-block;
background: transparent;
border: 1px solid var(--purple);
color: #fff;
padding: 14px 32px;
border-radius: 12px;
text-decoration: none;
font-weight: 600;
transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
margin-top: 20px;
}
.btn:hover {
background: var(--purple);
box-shadow: 0 0 30px rgba(188, 19, 254, 0.4);
transform: translateY(-2px);
}
.social-links {
margin-top: 40px;
display: flex;
justify-content: center;
gap: 20px;
opacity: 0.6;
}
.social-links a { color: #fff; text-decoration: none; font-size: 0.9rem; }
.social-links a:hover { color: var(--cyan); }
</style>
</head>
<body>
<div class="container">
<div class="status">System Status: [ONLINE]</div>
<h1>XYBERHAZE</h1>
<p>Professional Penetration Tester & Digital Sentry. <br>Providing technical clarity in the haze of AI Red Teaming and On-Chain Intel.</p>

<a href="https://t.me/Xyber_Haze" class="btn">Access the Lab</a>

<div class="social-links">
<a href="https://twitter.com/XyberHaze">X (Twitter)</a>
<a href="https://facebook.com/XyberHaze">Facebook</a>
</div>
</div>
</body>
</html>
