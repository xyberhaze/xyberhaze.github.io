<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XyberHaze | Hash Identity Tool</title>
    <style>
        /* THE "HAZE" BACKGROUND */
        body {
            background: radial-gradient(circle at top left, #1a1a2e, #16213e, #0f3460);
            color: #e2e2e2;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* THE "XYBER" GLASS BOX */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 450px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            text-align: center;
        }

        h1 {
            background: linear-gradient(to right, #00d2ff, #928dab);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #444;
            border-radius: 8px;
            color: #00d2ff;
            outline: none;
        }

        button {
            background: linear-gradient(45deg, #0f3460, #e94560);
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.5);
        }

        #result {
            margin-top: 25px;
            font-weight: bold;
            color: #00d2ff;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>🦞 XYBERHAZE</h1>
        <p>Advanced Hash Identifier</p>
        <input type="text" id="hashInput" placeholder="Paste hash here...">
        <button onclick="identifyHash()">IDENTIFY</button>
        <div id="result"></div>
    </div>

    <script>
        function identifyHash() {
            const hash = document.getElementById('hashInput').value.trim();
            const result = document.getElementById('result');
            
            if (hash.length === 32) result.innerHTML = "Type: MD5 (Legacy Checksum)";
            else if (hash.length === 40) result.innerHTML = "Type: SHA-1 (Secure Hash)";
            else if (hash.length === 64) result.innerHTML = "Type: SHA-256 (Modern Crypto)";
            else if (hash.length === 128) result.innerHTML = "Type: SHA-512 (High Security)";
            else result.innerHTML = "Unknown Hash Length";
        }
    </script>
</body>
</html>
